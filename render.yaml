databases:
  - name: arbitrage-db
    databaseName: arbitrage_db
    plan: free

services:
  # Flask API
  - type: web
    name: arbitrage-api
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn 'src.app:app' --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: arbitrage-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: KALSHI_API_KEY
        sync: false
      - key: KALSHI_EMAIL
        sync: false
      - key: KALSHI_PASSWORD
        sync: false
      - key: POLYMARKET_API_KEY
        sync: false
      - key: FLASK_DEBUG
        value: "False"
      - key: LOG_LEVEL
        value: "INFO"

  # APScheduler background worker
  - type: worker
    name: arbitrage-worker
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python -m src.scheduler"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: arbitrage-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: KALSHI_API_KEY
        sync: false
      - key: KALSHI_EMAIL
        sync: false
      - key: KALSHI_PASSWORD
        sync: false
      - key: POLYMARKET_API_KEY
        sync: false
      - key: LOG_LEVEL
        value: "INFO"

  # React frontend (static site)
  - type: static
    name: arbitrage-frontend
    buildCommand: "cd frontend && npm ci --legacy-peer-deps && npm run build"
    staticPublishPath: frontend/build
    routes:
      - type: rewrite
        source: /api/*
        destination: https://arbitrage-api.onrender.com/api/:splat
      - type: rewrite
        source: /*
        destination: /index.html
