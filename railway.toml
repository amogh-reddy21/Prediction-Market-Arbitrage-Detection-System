# Railway configuration — API web service
# Docs: https://docs.railway.com/reference/config-as-code
#
# IMPORTANT: After deploying, go to the service Settings → Networking
# and click "Generate Domain" so the service gets a public URL.
#
# For the background WORKER service, add a second service from the same
# GitHub repo and set the start command to:  python -m src.scheduler

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "gunicorn src.app:app --config gunicorn.conf.py"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
