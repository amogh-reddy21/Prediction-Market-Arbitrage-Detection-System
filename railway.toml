# Railway configuration — API web service
# Docs: https://docs.railway.com/reference/config-as-code
#
# For the background WORKER service, create a second service in the Railway
# dashboard pointing at the same GitHub repo and set the start command to:
#   python -m src.scheduler

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "gunicorn src.app:app --config gunicorn.conf.py"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
healthcheckPath = "/api/health"
healthcheckTimeout = 30
